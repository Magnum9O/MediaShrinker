services:
  mediashrinker:
    image: ghcr.io/magnum9o/mediashrinker:latest
    container_name: mediashrinker
    restart: unless-stopped
    ports:
      - "8787:8787"
    volumes:
      - /volume1/Media/Movies:/data/movies
      - /volume1/Media/TV:/data/tv
      - /volume1/docker/mediashrinker/staging:/staging
      - /volume1/docker/mediashrinker/reports:/reports

